name: CI

on:
  workflow_dispatch: # Manually trigger a workflow run using the GitHub API, GitHub CLI, or the GitHub UI.
  push:
  pull_request:

permissions:
  contents: read # required for code coverage
  
jobs:

  download-test-model:
    name: download-test-model
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.02

      - name: Set up Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2
        id: python-setup
        with:
          python-version: 3.13
      
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        id: setup-uv
        with:
          # Install a specific version of uv.
          version: "0.11.7"
          enable-cache: true
          restore-cache: true
          save-cache: true
          prune-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: 3.13

      - name: Install the project
        run: uv sync --locked --all-extras

      - name: check uv cache is working
        if: steps.setup-uv.outputs.cache-hit == 'true'
        run: echo "uv cache was restored"

      - name: Check HF model cache
        uses: actions/cache/restore@v4
        id: cache
        with:
          path: ~/hf_test_model_cache
          key: malaya-models-${{ runner.os }}

      - name: Download HuggingFace test model
        if: steps.cache.outputs.cache-hit != 'true'
        run: uv run tests/model_download.py $HOME/hf_test_model_cache

      - name: Saving HuggingFace test model
        uses: actions/cache/save@v4
        if: steps.cache.outputs.cache-hit != 'true'
        with:
          path: ~/hf_test_model_cache
          key: malaya-models-${{ runner.os }}


  checks:
    name: checks
    runs-on: ${{ matrix.os }}
    needs:
      - download-test-model
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        os: [ubuntu-latest, macos-latest, windows-latest]
    
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.02

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2
        id: python-setup
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        id: setup-uv
        with:
          # Install a specific version of uv.
          version: "0.11.7"
          enable-cache: true
          restore-cache: true
          save-cache: true
          prune-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: ${{ matrix.python-version }}

      - name: Install the project
        run: uv sync --locked --all-extras

      - name: check uv cache is working
        if: steps.setup-uv.outputs.cache-hit == 'true'
        run: echo "uv cache was restored"

      - name: Linter
        run: uv run ruff check src tests

      - name: Type Checking
        run: uv run ty check src tests

      - name: Windows create HuggingFace Hub cache directory
        if: ${{ runner.os == 'Windows' }}
        run: |
          mkdir "$HOME\.cache"
          mkdir "$HOME\.cache\huggingface"
          mkdir "$HOME\.cache\huggingface\hub"
          echo "HF_HOME=$HOME\.cache\huggingface" >> $env:GITHUB_ENV
      
      - name: Linux create HuggingFace Hub cache directory
        if: ${{ runner.os == 'macOS' || runner.os == 'Linux' }}
        run: |
          mkdir -p $HOME/.cache/huggingface/hub
          echo "HF_HOME=$HOME/.cache/huggingface" >> "$GITHUB_ENV"

      - name: Get HF model cache
        uses: actions/cache/restore@v4
        with:
          path: ~/hf_test_model_cache
          key: malaya-models-${{ runner.os }}
          lookup-only: false

      - name: Move cached files
        run: mv $HOME/hf_test_model_cache/* $HF_HOME/hub/.

      - name: Check cache files
        run: ls $HF_HOME

      - name: Code coverage unit testing
        run: |
          uv run coverage run

      - name: Code coverage report
        run: |    
          uv run coverage report
          